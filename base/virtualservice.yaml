apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: rollout-demo2-vsvc
spec:
  gateways:
  - istio-system/istio-demo2-rollout-gateway
  hosts:
  - istio-demo2.local
  http:
  - name: primary       # referenced in canary.trafficRouting.istio.virtualService.routes
    route:
    - destination:
        host: rollout-demo2
        subset: stable-demo2  # referenced in canary.trafficRouting.istio.destinationRule.stableSubsetName
    - destination:
        host: rollout-demo2
        subset: canary-demo2  # referenced in canary.trafficRouting.istio.destinationRule.canarySubsetName
